<!doctype html>
<html lang="en">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet" />

    <!-- Open Graph (iMessage, WhatsApp, Slack, Facebook, etc.) -->
    <meta property="og:title" content="Join the Parallel matching pool" />
    <meta property="og:description" content="A dating app that matches you on who you actually are — not just how you look. Answer 68 questions, get real matches." />
    <meta property="og:type" content="website" />

    <meta property="og:image:alt" content="Parallel — professional matchmaking" />
    <meta property="og:site_name" content="Parallel" />

    <!-- iOS PWA / Add to Home Screen settings -->
