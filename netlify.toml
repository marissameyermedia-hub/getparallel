# Parallel — Netlify configuration
# Cache strategy:
#   index.html        → never cache (always fresh on deploy)
#   /assets/*         → cache 1 year (Vite content-hashes filenames on every build)
#   service workers   → never cache (must always be re-fetched)
#   static assets     → cache 1 week


[build]
  command = "npm run build"
  publish = "dist"
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/OneSignalSDKWorker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/OneSignalSDK.sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self)"

# ── Static policy pages ────────────────────────────────────────────
# Serve HTML files directly at clean URLs, before the SPA fallback.
# Files live in /public and are copied to /dist root on build.
[[redirects]]
  from = "/privacy"
  to   = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/guidelines"
  to   = "/guidelines.html"
  status = 200

[[redirects]]
  from = "/consumer-health-data"
  to   = "/consumer-health-data.html"
  status = 200

[[redirects]]
  from = "/help"
  to   = "/help.html"
  status = 200

[[redirects]]
  from = "/accessibility"
  to   = "/accessibility.html"
  status = 200

[[redirects]]
  from = "/affiliate-terms"
  to   = "/affiliate-terms.html"
  status = 200

# /affiliate deep link — sends affiliate applicants into the portal signup flow
[[redirects]]
  from = "/affiliate"
  to   = "/?view=affiliate-portal"
  status = 302

# /r/:slug tracked affiliate links — explicit redirect so attribution is
# captured even if the SPA JS fails to execute on first load
[[redirects]]
  from   = "/r/:slug"
  to     = "/?r=:slug"
  status = 302

# SPA fallback — must come LAST so policy pages above take priority
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
