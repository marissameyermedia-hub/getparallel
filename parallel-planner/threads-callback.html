<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threads Connected – Parallel Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f13;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2d2d3d;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #7c3aed;
      margin-bottom: 32px;
    }

    /* Spinner */
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #2d2d3d;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success icon */
    .icon-success {
      width: 56px;
      height: 56px;
      background: rgba(124, 58, 237, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-success svg { color: #7c3aed; }

    /* Error icon */
    .icon-error {
      width: 56px;
      height: 56px;
      background: rgba(239, 68, 68, 0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-error svg { color: #ef4444; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f1f5f9;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      color: #94a3b8;
    }

    .error-detail {
      margin-top: 16px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #fca5a5;
      word-break: break-word;
      text-align: left;
    }

    .status-loading h1 { color: #94a3b8; }
    .status-success h1 { color: #f1f5f9; }
    .status-error h1 { color: #fca5a5; }

    #state { display: none; }
    #state.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Parallel</div>

    <!-- Loading state -->
    <div id="loading">
      <div class="spinner"></div>
      <h1 class="status-loading">Connecting Threads…</h1>
      <p>Exchanging authorization code. This only takes a moment.</p>
    </div>

    <!-- Success state -->
    <div id="success" class="status-success" style="display:none">
      <div class="icon-success">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Threads Connected!</h1>
      <p>Posts will now publish to Instagram, TikTok, and Threads.</p>
    </div>

    <!-- Error state -->
    <div id="error" class="status-error" style="display:none">
      <div class="icon-error">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <h1>Connection Failed</h1>
      <p>Something went wrong while connecting your Threads account.</p>
      <div class="error-detail" id="error-detail"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://qnnjtmhwcpsmpzlxdxex.supabase.co';
    const ANON_KEY = 'sb_publishable_lF-dL9dqM8xrBlcPXTp6uw_pXGw3FEM';

    function show(id) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      document.getElementById(id).style.display = 'block';
    }

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');

      if (!code) {
        show('error');
        document.getElementById('error-detail').textContent =
          'No authorization code found in the URL. Please try connecting again from the Parallel Planner.';
        return;
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/threads-oauth`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${ANON_KEY}`,
          },
          body: JSON.stringify({ code }),
        });

        const data = await res.json();

        if (data.ok) {
          show('success');
        } else {
          show('error');
          document.getElementById('error-detail').textContent = data.error || 'Unknown error';
        }
      } catch (err) {
        show('error');
        document.getElementById('error-detail').textContent =
          err instanceof Error ? err.message : String(err);
      }
    }

    handleCallback();
  </script>
</body>
</html>
