# Parallel Planner — Netlify configuration
# Platforms: Instagram, Facebook, TikTok (via Buffer) — rebuild trigger
# Deploy trigger: post date auto-derives from grid slot, time-only input

[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
