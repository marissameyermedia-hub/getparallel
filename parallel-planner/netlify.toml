# Parallel Planner — Netlify configuration
# Platforms: Instagram, Facebook, TikTok (via Buffer), Threads
# Deploy trigger: scheduler failed-status fix + Buffer GraphQL field cleanup

[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
